<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 | SoleStyle 鞋履工坊</title>
  <meta name="description" content="聯絡 SoleStyle 鞋履工坊。在此提供台北信義旗艦店的店址、營業時間、服務電話，亦可填寫表單與我們的客服團隊取得聯絡。">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Global Navigation Header -->
  <header id="global-header"></header>

  <!-- Page Banner -->
  <section class="hero" style="padding: 4rem 1.5rem; text-align: center;">
    <div style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem;">
      <span class="hero-tagline" style="justify-content: center;">聯絡客服 & 門市據點</span>
      <h1 class="hero-title" style="font-size: 2.75rem;">我們很樂意為您服務</h1>
      <p class="hero-description" style="margin: 0 auto; max-width: 600px;">
        不論是產品挑選、保養諮詢、團體訂購或售後服務，隨時歡迎您與我們聯繫。
      </p>
    </div>
  </section>

  <!-- Main Content Layout -->
  <main class="container">
    <div class="contact-grid">
      <!-- Contact Info Panel -->
      <div class="contact-info-panel">
        <h2 class="contact-info-title">門市資訊</h2>
        
        <!-- Address -->
        <div class="contact-item">
          <div class="contact-icon">📍</div>
          <div class="contact-item-details">
            <h4>信義旗艦門市</h4>
            <p>台北市信義區松壽路 88 號 1 樓</p>
          </div>
        </div>

        <!-- Phone -->
        <div class="contact-item">
          <div class="contact-icon">📞</div>
          <div class="contact-item-details">
            <h4>客戶服務專線</h4>
            <p>(02) 2720-1234 (每日 11:00 - 22:00)</p>
          </div>
        </div>

        <!-- Email -->
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div class="contact-item-details">
            <h4>電子信箱</h4>
            <p>service@solestyle.com (24小時接收)</p>
          </div>
        </div>

        <!-- Map Placeholder -->
        <div style="margin-top: 1rem; border-radius: var(--radius-md); overflow: hidden; height: 180px; border: 1px solid var(--border-dark); position: relative;">
          <!-- Custom Premium Looking Simulated Map -->
          <div style="background-color: #151f32; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; gap: 0.5rem; background-image: radial-gradient(circle at 50% 50%, rgba(217,119,6,0.1), transparent 80%);">
            <div style="font-size: 2rem; animation: pulse 2s infinite;">📍</div>
            <div style="font-weight: 700; color: #fff; font-size: 0.95rem;">信義威秀商圈 / 微風松高旁</div>
            <div style="font-size: 0.8rem; color: var(--text-muted-dark);">搭乘捷運板南線至「市政府站」3號出口步行5分鐘</div>
          </div>
        </div>
      </div>

      <!-- Contact Form Panel -->
      <div class="contact-form-panel">
        <h2 class="contact-info-title">發送訊息</h2>
        <form id="contact-form" onsubmit="handleFormSubmit(event)">
          <!-- Name -->
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="name">您的姓名 <span style="color: red;">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="請輸入姓名" required>
          </div>

          <!-- Email -->
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="email">電子信箱 <span style="color: red;">*</span></label>
            <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
          </div>

          <!-- Subject -->
          <div class="form-group" style="margin-bottom: 1.25rem;">
            <label for="subject">諮詢主題</label>
            <select id="subject" class="form-control" style="background-color: #151f32; color: #fff;">
              <option value="product">產品挑選與尺寸諮詢</option>
              <option value="order">訂單與出貨查詢</option>
              <option value="care">鞋子保養與維修諮詢</option>
              <option value="cooperate">商業合作洽談</option>
              <option value="other">其它意見回饋</option>
            </select>
          </div>

          <!-- Message -->
          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="message">您的留言內容 <span style="color: red;">*</span></label>
            <textarea id="message" class="form-control" placeholder="請寫下您想詢問的事情..." required></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary" style="width: 100%;">發送訊息</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Global Footer -->
  <footer id="global-footer"></footer>

  <!-- Global Cart Drawer Container -->
  <div id="global-cart-container"></div>

  <!-- Scripts -->
  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script>
    function handleFormSubmit(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !message) {
        showToast('請填寫所有必填欄位！');
        return;
      }

      // Simulate successful form submit
      showToast(`謝謝您，${name}！您的留言已送出，客服將儘速回覆。`);
      
      // Reset form
      document.getElementById('contact-form').reset();
    }
  </script>

  <style>
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(217,119,6,0.3)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(217,119,6,0.8)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(217,119,6,0.3)); }
    }
  </style>
</body>
</html>
